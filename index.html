<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Nouna</title>

<style>

body{
    background:#f7c6d0;
    font-family:Arial;
    text-align:center;
    padding-top:100px;
}

h1{
    font-size:55px;
    color:#ff4f7a;
}

p{
    font-size:24px;
    width:65%;
    margin:auto;
    line-height:1.8;
    color:#444;
}

.card{
    background:white;
    padding:50px;
    width:70%;
    margin:auto;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff4f7a;
    color:white;
    cursor:pointer;
}

#stiker{
    display:none;
    margin-top:25px;
    width:250px;
}

</style>

</head>

<body>

<div class="card">

<h1>Happy Birthday Nouna 🎉</h1>

<p>
Ternyata kamu ulang tahun hari ini,
pantes aja cuaca cerah banget haha.
</p>

<p>
Semoga kamu selalu sehat dan semua yang kamu impikan
bisa tercapai satu per satu.
</p>

<p>
Semoga tahun ini menjadi tahun yang bermakna untukmu. 🥳
</p>

<button onclick="showStiker()">Klik ini 🎁</button>

<br>

<img id="stiker" src="https://i.imgur.com/1X4J8pP.jpeg">

<audio id="lagu">
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

</div>

<script>

function showStiker(){
document.getElementById("stiker").style.display="block";
document.getElementById("lagu").play();
}

</script>

</body>
</html>
